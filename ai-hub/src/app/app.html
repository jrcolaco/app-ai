<div class="container">

  <h1>AI HUB 🚀</h1>

  <app-weather />

  <div class="menu">
    <button (click)="setMode('chat')" [disabled]="mode() === 'chat'">
      💬 Chat
    </button>

    <button (click)="setMode('image')" [disabled]="mode() === 'image'">
      🖼️ Image
    </button>

    <button (click)="setMode('vision')" [disabled]="mode() === 'vision'">
      👁️ Vision
    </button>
  </div>

  <div class="content">
    @if (mode() === 'chat') {
      <app-chat />
    }

    @if (mode() === 'image') {
      <app-image-gen />
    }

    @if (mode() === 'vision') {
      <app-vision-ai />
    }
  </div>

</div>
