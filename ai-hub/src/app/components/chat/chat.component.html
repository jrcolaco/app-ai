<div class="chat-container">
    @if (loading()) {
        <p class="loading">⏳ Generating...</p>
    }
    <input
        [value]="message()"
        (input)="updateInput($event)"
        (keydown.enter)="send()"
        placeholder="Type or speak..."
        [disabled]="isRecording() || loading()"
    />
    <div class="actions">
    <button
        (click)="send()"
        [disabled]="!message().trim() || isRecording() || isSpeaking() || loading()"
    >
        Send
    </button>
    <button
        (click)="speak()"
        [disabled]="!lastResponse() || isRecording() || isSpeaking() || loading()"
    >
        🔊 Hear
    </button>
    @if (isRecording()) {
        <button (click)="stopRecording()">
        ⛔ Stop
        </button>
    } @else {
        <button
        (click)="startRecording()"
        [disabled]="isSpeaking() || loading()"
        >
        🎤 Speak
        </button>
    }
    </div>
    <p class="response">{{ response() }}</p>
</div>
